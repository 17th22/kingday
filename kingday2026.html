<!DOCTYPE html>
<html lang="ko">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --p:#6C63FF;--pl:#EEEEFF;--pd:#2D2780;--pm:#9D97F5;
  --pk:#FF6B9D;--pkl:#FFF0F5;
  --g:#34C48B;--gl:#E8FBF3;--gd:#0E6B47;
  --b:#4B9FE1;--bl:#EBF4FF;
  --r:#FF5C5C;--rl:#FFF0F0;--rd:#8B1A1A;
  --y:#FFB830;--yl:#FFF8E8;--yd:#7A4F00;
  --bg:#FAF9FF;--bg2:#F2F1FA;--bg3:#EAE9F5;
  --text:#2D2B4E;--text2:#7B7A9E;--text3:#AEADCC;
  --border:rgba(108,99,255,0.15);--border2:rgba(108,99,255,0.25);
  --radius:14px;--radius-sm:10px;--radius-xs:8px;
  --shadow:0 2px 12px rgba(108,99,255,0.08);
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1E1C2E;--bg2:#272540;--bg3:#302E4A;
    --text:#E8E6FF;--text2:#9896C0;--text3:#6B6990;
    --border:rgba(157,151,245,0.15);--border2:rgba(157,151,245,0.28);
    --pl:#2A2860;--pd:#C8C4FF;
    --gl:#0C2E20;--gd:#9FE8CB;
    --rl:#2E1515;--yl:#2E2200;
    --pkl:#2E1525;
    --shadow:0 2px 12px rgba(0,0,0,0.25);
  }
}
body{background:var(--bg3);font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:var(--text);min-height:100vh;}
.wrap{max-width:460px;margin:0 auto;padding:1rem 1rem 6rem;}

/* 헤더 */
.hdr{text-align:center;padding:1.5rem 0 1rem;}
.hdr-emoji{font-size:48px;margin-bottom:.5rem;display:block;animation:bounce 2s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
h1{font-size:22px;font-weight:700;color:var(--p);}
.sub{font-size:13px;color:var(--text2);margin-top:4px;}

/* 탭 */
.tabs{display:flex;gap:.5rem;margin-bottom:1.5rem;background:var(--bg2);border-radius:var(--radius);padding:.3rem;}
.tab{flex:1;padding:.6rem .4rem;text-align:center;font-size:14px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-weight:500;transition:all .18s;}
.tab.on{background:var(--p);color:white;box-shadow:0 2px 8px rgba(108,99,255,.3);}

/* 섹션 */
.sec{margin-bottom:1.5rem;}
.sec-title{font-size:11px;font-weight:700;color:var(--p);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.625rem;display:flex;align-items:center;gap:5px;}
.sec-title::before{content:'';width:3px;height:13px;background:var(--p);border-radius:2px;display:inline-block;}
.sec-hint{font-size:12px;color:var(--text2);margin-bottom:.5rem;padding:.4rem .6rem;background:var(--pl);border-radius:var(--radius-xs);}
.badge-hint{font-size:10px;font-weight:500;color:var(--p);background:var(--pl);padding:2px 7px;border-radius:20px;margin-left:6px;vertical-align:middle;}

/* 이름 입력 */
.ni{width:100%;font-size:16px;padding:.8rem 1rem;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;}
.ni:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(108,99,255,.12);}

/* 달력 */
.mtabs{display:flex;gap:.4rem;margin-bottom:.75rem;}
.mtab{padding:.4rem .9rem;font-size:13px;border:1.5px solid var(--border2);border-radius:20px;cursor:pointer;color:var(--text2);background:var(--bg);font-weight:500;}
.mtab.on{background:var(--p);color:white;border-color:var(--p);box-shadow:0 2px 6px rgba(108,99,255,.25);}
.day-mode{display:flex;gap:.35rem;margin-bottom:.5rem;}
.dm-btn{flex:1;padding:.45rem .4rem;text-align:center;font-size:12px;border:1.5px solid var(--border2);border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);background:var(--bg);font-weight:500;}
.dm-btn.on-avail{background:var(--pl);border-color:var(--p);color:var(--p);}
.dm-btn.on-nope{background:var(--rl);border-color:var(--r);color:var(--rd);}
.wk-block{margin-bottom:.6rem;}
.wk-head{font-size:11px;color:var(--text3);margin-bottom:.3rem;padding-left:2px;font-weight:600;}
.day-row{display:flex;gap:.3rem;}
.day-chip{flex:1;padding:.55rem .15rem;text-align:center;border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;color:var(--text);background:var(--bg);position:relative;user-select:none;transition:all .12s;}
.day-chip b{display:block;font-weight:600;}
.day-chip span{display:block;font-size:10px;color:var(--text3);margin-top:1px;}
.day-chip.sat span{color:var(--b);}
.day-chip.sun span{color:var(--r);}
.day-chip.avail.on{background:var(--pl);border-color:var(--p);color:var(--pd);}
.day-chip.avail.on span{color:var(--p);}
.day-chip.nope.on{background:var(--rl);border-color:var(--r);color:var(--rd);}
.day-chip.nope.on span{color:var(--r);}
.day-chip-x{display:none;position:absolute;top:2px;right:3px;font-size:9px;color:var(--r);font-weight:700;}
.day-chip.nope.on .day-chip-x{display:block;}

/* 카드 (복수선택) */
.card{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:.7rem .9rem;margin-bottom:.35rem;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .12s;box-shadow:var(--shadow);}
.card:active{transform:scale(0.98);}
.card.on{border-color:var(--p);background:var(--pl);}
.chk{width:20px;height:20px;min-width:20px;border-radius:6px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;transition:all .12s;}
.card.on .chk{background:var(--p);border-color:var(--p);color:white;}
.card-lbl{font-size:14px;color:var(--text);font-weight:500;}
.card.on .card-lbl{color:var(--pd);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.35rem;}

/* 여행기간 */
.date-entry{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:.8rem .9rem;margin-bottom:.4rem;position:relative;box-shadow:var(--shadow);}
.de-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.35rem;}
.de-row:last-child{margin-bottom:0;}
.de-lbl{font-size:12px;color:var(--text2);min-width:44px;font-weight:600;}
.de-in{flex:1;font-size:15px;padding:.45rem .7rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);outline:none;}
.de-in:focus{border-color:var(--p);}
.del-btn{position:absolute;top:.6rem;right:.7rem;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;font-size:16px;color:var(--text2);line-height:22px;text-align:center;}
.add-btn{width:100%;padding:.65rem;border:1.5px dashed var(--border2);border-radius:var(--radius);background:transparent;font-size:14px;color:var(--p);cursor:pointer;font-weight:600;}

/* 지역 */
.loc-tabs{display:flex;gap:.4rem;margin-bottom:.625rem;}
.loc-tab{flex:1;padding:.6rem .4rem;text-align:center;font-size:14px;border:1.5px solid var(--border2);border-radius:var(--radius);cursor:pointer;color:var(--text2);background:var(--bg);font-weight:600;}
.loc-tab.on-dom{background:var(--gl);border-color:var(--g);color:var(--gd);}
.loc-tab.on-abr{background:var(--bl);border-color:var(--b);color:var(--b);}

/* 셀렉트 */
.sel{width:100%;font-size:15px;padding:.75rem .9rem;border:1.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;appearance:none;}

/* 토글 */
.toggle-box{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:.875rem 1rem;box-shadow:var(--shadow);}
.toggle-row{display:flex;align-items:center;gap:12px;margin-bottom:.75rem;}
.toggle-row:last-child{margin-bottom:0;}
.tw{width:46px;height:27px;border-radius:14px;background:var(--border2);position:relative;cursor:pointer;flex-shrink:0;border:none;padding:0;transition:background .15s;}
.tw.on{background:var(--p);}
.tk{width:21px;height:21px;border-radius:50%;background:white;position:absolute;top:3px;left:3px;transition:left .15s;pointer-events:none;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.tw.on .tk{left:22px;}
.toggle-lbl{font-size:14px;color:var(--text);font-weight:500;}

/* 에러/성공 */
.err{font-size:13px;color:var(--r);margin-top:.5rem;min-height:18px;}
.ok-box{background:var(--gl);border:1.5px solid var(--g);border-radius:var(--radius);padding:.75rem 1rem;font-size:13px;color:var(--gd);margin-bottom:1rem;font-weight:500;}

/* 버튼 */
.btn{width:100%;padding:.9rem;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;border:none;margin-top:.5rem;display:block;text-align:center;transition:all .15s;}
.btn-p{background:linear-gradient(135deg,#6C63FF,#9D97F5);color:white;box-shadow:0 4px 14px rgba(108,99,255,.35);}
.btn-p:active{transform:scale(0.98);}
.btn-danger{background:var(--rl);color:var(--r);border:1.5px solid var(--r)!important;font-weight:600;}
.btn-s{background:transparent;color:var(--text2);border:1.5px solid var(--border2)!important;}

/* 결과 */
.ri{margin-bottom:.875rem;}
.ri-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.3rem;}
.ri-lbl{font-size:13px;color:var(--text);font-weight:500;}
.ri-ct{font-size:12px;color:var(--text2);}
.bar-bg{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;}
.bar{height:100%;border-radius:4px;transition:width .4s ease;}
.bar-p{background:linear-gradient(90deg,var(--p),var(--pm));}
.bar-r{background:linear-gradient(90deg,var(--r),#FF9090);}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:.4rem;}
.tag{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--pl);color:var(--p);font-weight:500;}
.tag-r{background:var(--rl);color:var(--rd);}
.avs{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.1);}
.divider{height:1px;background:var(--border);margin:1.25rem 0;}
.best-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;background:var(--yl);color:var(--yd);margin-left:6px;vertical-align:middle;font-weight:600;}
.res-trip{background:var(--bg2);border-radius:var(--radius-sm);padding:.5rem .75rem;margin-bottom:.3rem;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
.legend{display:flex;gap:12px;margin-bottom:.625rem;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);}
.legend-dot{width:10px;height:10px;border-radius:3px;}
.car-info{font-size:13px;background:var(--bg2);border-radius:var(--radius-sm);padding:.5rem .75rem;margin-top:.35rem;line-height:1.8;}
.loading{padding:4rem 0;text-align:center;color:var(--text2);font-size:14px;}
.star-row{display:flex;justify-content:center;gap:4px;margin-top:4px;}
</style>
</head>

const VENUES=["파티룸","펜션","에어비앤비","상관없음"];
const DOM_LOCS=["서울/수도권","서울 근교","제주도","기타 국내"];
const ABR_LOCS=["일본","동남아시아","중국","기타 해외"];
const AMENS=[
  {id:"computer",label:"💻 컴퓨터 (PoE)"},
  {id:"shower",label:"🚿 샤워 시설"},
  {id:"bed",label:"🛏️ 침대/이불"},
  {id:"bbq",label:"🍖 야외 바베큐"},

const BUDGETS=["1~5만원","5~10만원","10~15만원","15~20만원","20~30만원","30만원 이상","상관없음"];

  err:"",msg:""
};

async function loadVotes(){
  if(!CONFIGURED){st.votes=[];return;}
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,
      {headers:{"X-Master-Key":API_KEY,"X-Bin-Meta":"false"}});

  }catch(e){st.votes=[];}

async function saveVotes(){

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtDate(d){if(!d)return"";const[,m,dd]=d.split("-");return`${+m}/${+dd}`;}

      const mode=isN?"nope":isA?"avail":"";

function barItem(lbl,count,tot,voters,best,red){
  const pct=tot>0?Math.round(count/tot*100):0;
  return`<div class="ri">
    <div class="ri-top"><span class="ri-lbl">${lbl}${best?`<span class="best-badge">최다 🏆</span>`:""}</span><span class="ri-ct">${count}명 · ${pct}%</span></div>
    <div class="bar-bg"><div class="bar ${red?"bar-r":"bar-p"}" style="width:${pct}%"></div></div>
    ${voters&&voters.length?`<div class="tags">${voters.map(n=>`<span class="${red?"tag-r":"tag"}">${esc(n)}</span>`).join("")}</div>`:""}
  </div>`;
}

function resultsHTML(){

  const ltc={"국내":{count:0,v:[]},"해외":{count:0,v:[]}};
  let drv=[],alc=[];const csT={};
  st.votes.forEach(v=>{
    (v.availDays||[]).forEach(d=>{avc[d]=(avc[d]||0)+1;avn[d]=avn[d]||[];avn[d].push(v.name);});

    (v.locations||[]).forEach(l=>{if(lc[l]){lc[l].count++;lc[l].v.push(v.name);}});

    (v.budgets||[]).forEach(b=>{if(bc[b]){bc[b].count++;bc[b].v.push(v.name);}});

    <div class="tabs"><div class="tab" id="toForm">✏️ 투표하기</div><div class="tab on">📊 결과 (${tot}명)</div><div class="tab" id="toAdmin">🔐</div></div>
    ${st.myVote?`<div style="display:flex;gap:.5rem;margin-bottom:1rem;">
      <button class="btn btn-s" style="flex:1;margin-top:0" id="toForm3">✏️ 수정하기</button>
      <button class="btn btn-danger" style="flex:1;margin-top:0" id="cancelVoteBtn2">🗑️ 투표 취소</button>
    </div>`:""}
    ${tot>0?`<div class="sec"><div class="sec-title">참여자 (${tot}명)</div>
      <div class="avs">${st.votes.map((v,i)=>`<div class="av" style="background:${AV_BG[i%10]};color:${AV_FG[i%10]}" title="${esc(v.name)}">${esc(v.name.slice(0,2))}</div>`).join("")}</div>
      <div style="font-size:13px;color:var(--text2);margin-top:.4rem">${st.votes.map(v=>esc(v.name)).join(", ")}</div>
    </div>`:""}
    ${tot>0&&allDays.length?`<div class="sec"><div class="sec-title">날짜별 현황</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--pl);border:1px solid var(--p)"></div>가능</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--rl);border:1px solid var(--r)"></div>절대 불가</div>
      </div>
      ${allDays.map(d=>{const[,m,dd]=d.split("-");const ac2=avc[d]||0,nc=npc[d]||0;
        return`<div style="margin-bottom:.75rem"><div style="font-size:13px;font-weight:700;margin-bottom:.35rem">${+m}월 ${+dd}일</div>
          ${ac2>0?barItem(`가능 ${ac2}명`,ac2,tot,avn[d],d===bestDay,false):""}

    ${tot>0?`<div class="sec"><div class="sec-title">국내 vs 해외</div>
      ${["국내","해외"].map(l=>barItem(l,ltc[l].count,tot,ltc[l].v,false,false)).join("")}
    </div>
    <div class="sec"><div class="sec-title">선호 지역</div>
      ${[...DOM_LOCS,...ABR_LOCS].filter(l=>lc[l].count>0).sort((a,b)=>lc[b].count-lc[a].count).map(l=>barItem(l,lc[l].count,tot,lc[l].v,false,false)).join("")||`<div style="font-size:13px;color:var(--text2)">아직 응답 없음</div>`}
    </div><div class="divider"></div>`:""}

    ${tot>0?`<div class="sec"><div class="sec-title">1인 총 경비</div>
      ${BUDGETS.map(b=>barItem(b,bc[b].count,tot,bc[b].v,false,false)).join("")}

    ${tot>0?`<div class="sec"><div class="sec-title">필수 시설 요구</div>
      ${AMENS.filter(a=>ac[a.id].count>0).sort((a,b)=>ac[b.id].count-ac[a.id].count).map(a=>barItem(a.label,ac[a.id].count,tot,ac[a.id].v,false,false)).join("")||`<div style="font-size:13px;color:var(--text2)">아직 응답 없음</div>`}
    </div><div class="divider"></div>`:""}
    ${tot>0?`<div class="sec"><div class="sec-title">이동 / 기타</div>
      <div style="margin-bottom:.875rem">

        ${drv.length?`<div class="car-info">${drv.map(n=>esc(n)).join(" · ")}</div><div style="font-size:12px;color:var(--text2);margin-top:.35rem">탑승 가능 합산 약 ${totalSeats}명</div>`:`<div style="font-size:13px;color:var(--text2)">없음</div>`}
      </div>
      <div>
        <div style="font-size:13px;font-weight:700;margin-bottom:.35rem">🍺 음주 희망 (${alc.length}명)</div>
        ${alc.length?`<div class="tags">${alc.map(n=>`<span class="tag">${esc(n)}</span>`).join("")}</div>`:`<div style="font-size:13px;color:var(--text2)">없음</div>`}
      </div>
    </div>`:""}
  </div>`;
}

async function cancelVote(){
  const nm=st.myVote?.name||st.name.trim();
  if(!nm)return;
  if(!confirm(`"${nm}"의 투표를 취소할까요?`))return;
  st.votes=st.votes.filter(v=>v.name!==nm);
  st.myVote=null;
  st.form={availDays:[],nopeDays:[],trips:[{from:"",to:""}],
    venues:[],locType:"",locations:[],amenities:[],budgets:[],
    canDrive:false,seats:"",wantAlcohol:false};
  st.err="";st.msg="투표가 취소되었습니다.";
  try{await saveVotes();}catch(e){}
  st.view="form";render();
  setTimeout(()=>{st.msg="";render();},3000);
}

function bind(){
  const app=document.getElementById("app");
  app.querySelectorAll("[data-month]").forEach(el=>el.addEventListener("click",()=>{st.activeMonth=el.dataset.month;render();}));
  app.querySelectorAll("[data-dmode]").forEach(el=>el.addEventListener("click",()=>{st.dateMode=el.dataset.dmode;render();}));
  app.querySelectorAll("[data-day]").forEach(el=>el.addEventListener("click",()=>{
    const d=el.dataset.day,f=st.form;
    if(st.dateMode==="avail"){const i=f.availDays.indexOf(d);if(i>-1)f.availDays.splice(i,1);else{f.nopeDays=f.nopeDays.filter(x=>x!==d);f.availDays.push(d);}}
    else{const i=f.nopeDays.indexOf(d);if(i>-1)f.nopeDays.splice(i,1);else{f.availDays=f.availDays.filter(x=>x!==d);f.nopeDays.push(d);}}
    st.err="";render();
  }));
  app.querySelectorAll("[data-marr]").forEach(el=>el.addEventListener("click",()=>{
    const key=el.dataset.marr,val=el.dataset.val;
    const arr=st.form[key];const i=arr.indexOf(val);
    if(i>-1)arr.splice(i,1);else arr.push(val);render();
  }));
  app.querySelectorAll("[data-loctype]").forEach(el=>el.addEventListener("click",()=>{
    const prev=st.form.locType;
    st.form.locType=el.dataset.loctype===prev?"":el.dataset.loctype;
    st.form.locations=[];st.err="";render();
  }));
  app.querySelectorAll("[data-toggle]").forEach(el=>el.addEventListener("click",()=>{
    const k=el.dataset.toggle;st.form[k]=!st.form[k];
    if(k==="canDrive"&&!st.form.canDrive)st.form.seats="";render();
  }));
  const ni=document.getElementById("nameIn");
  if(ni)ni.addEventListener("input",e=>{st.name=e.target.value;st.err="";});
  const ss=document.getElementById("seatsSelect");
  if(ss)ss.addEventListener("change",e=>{st.form.seats=e.target.value;});
  app.querySelectorAll("[data-trip]").forEach(inp=>inp.addEventListener("change",e=>{st.form.trips[+e.target.dataset.trip][e.target.dataset.field]=e.target.value;}));
  app.querySelectorAll("[data-del]").forEach(btn=>btn.addEventListener("click",()=>{const i=+btn.dataset.del;if(st.form.trips.length>1)st.form.trips.splice(i,1);render();}));
  const addTrip=document.getElementById("addTrip");
  if(addTrip)addTrip.addEventListener("click",()=>{st.form.trips.push({from:"",to:""});render();});
  const sub=document.getElementById("submitBtn");
  if(sub)sub.addEventListener("click",doSubmit);
  const cvb=document.getElementById("cancelVoteBtn");
  if(cvb)cvb.addEventListener("click",cancelVote);
  const cvb2=document.getElementById("cancelVoteBtn2");
  if(cvb2)cvb2.addEventListener("click",cancelVote);
  ["toRes","toRes2"].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener("click",()=>{st.view="results";render();});});
  ["toForm","toForm2","toForm3"].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener("click",()=>{st.view="form";render();});});
  const toAdmin=document.getElementById("toAdmin");
  if(toAdmin)toAdmin.addEventListener("click",()=>{st.view="admin";render();});
}

async function doSubmit(){
  const nm=(document.getElementById("nameIn")?.value||"").trim()||st.name.trim();
  if(!nm){st.err="이름을 입력해주세요.";render();return;}
  const f=st.form;
  if(!f.availDays.length&&!f.trips.some(t=>t.from&&t.to)){st.err="가능한 날짜 또는 여행 기간을 선택해주세요.";render();return;}
  if(!f.venues.length){st.err="숙소 유형을 선택해주세요.";render();return;}
  if(!f.locType){st.err="국내/해외를 선택해주세요.";render();return;}
  st.name=nm;
  const vo={name:nm,availDays:[...f.availDays],nopeDays:[...f.nopeDays],
    trips:f.trips.map(t=>({...t})),venues:[...f.venues],locType:f.locType,
    locations:[...f.locations],amenities:[...f.amenities],budgets:[...f.budgets],
    canDrive:f.canDrive,seats:f.seats,wantAlcohol:f.wantAlcohol,ts:Date.now()};
  const idx=st.votes.findIndex(v=>v.name===nm);
  if(idx>-1)st.votes[idx]=vo;else st.votes.push(vo);
  st.myVote=vo;st.err="";st.saving=true;render();
  try{
    await saveVotes();
    st.saving=false;st.msg="🎉 투표가 저장되었습니다!";
    st.view="results";render();
    setTimeout(()=>{st.msg="";render();},3000);
  }catch(e){st.saving=false;st.err="저장 실패. 다시 시도해주세요.";render();}
}

  const app=document.getElementById("app");
  ["toRes"].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener("click",()=>{st.view="results";render();});});
  ["toForm","toForm2"].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener("click",()=>{st.view="form";render();});});
  const loginBtn=document.getElementById("adminLoginBtn");
  if(loginBtn)loginBtn.addEventListener("click",()=>{
    const pw=document.getElementById("adminPwIn")?.value||"";
    if(pw===ADMIN_PW){st.isAdmin=true;render();}
    else{document.getElementById("adminErr").textContent="비밀번호가 틀렸어요.";}
  });
  const logoutBtn=document.getElementById("adminLogout");
  if(logoutBtn)logoutBtn.addEventListener("click",()=>{st.isAdmin=false;st.view="form";render();});
  const clearAll=document.getElementById("clearAllBtn");
  if(clearAll)clearAll.addEventListener("click",async()=>{
    if(!confirm("전체 투표를 삭제할까요?"))return;
    st.votes=[];await saveVotes();render();
  });
  app.querySelectorAll("[data-deluser]").forEach(btn=>btn.addEventListener("click",async()=>{
    const nm=btn.dataset.deluser;
    if(!confirm(`"${nm}"의 투표를 삭제할까요?`))return;
    st.votes=st.votes.filter(v=>v.name!==nm);
    if(st.myVote?.name===nm)st.myVote=null;
    await saveVotes();render();
  }));
}

function render(){
  const app=document.getElementById("app");
  if(st.view==="admin"){
    app.innerHTML=st.isAdmin?adminHTML():adminLoginHTML();
    bindAdmin();
  } else {
    app.innerHTML=st.view==="form"?formHTML():resultsHTML();
    bind();
  }
}

(async function(){await loadVotes();render();})();
</script>
</body>
</html>
