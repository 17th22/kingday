<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>👑 킹데이 2026 투표</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --purple:#534AB7;--purple-light:#EEEDFE;--purple-dark:#26215C;--purple-mid:#7F77DD;
  --green:#1D9E75;--green-light:#E1F5EE;--green-dark:#085041;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --red:#E24B4A;--red-light:#FCEBEB;--red-dark:#791F1F;
  --amber-light:#FAEEDA;--amber-dark:#633806;
  --bg:#fff;--bg2:#f6f6f4;--bg3:#f0efe9;
  --text:#1a1a18;--text2:#6b6b66;--text3:#9a9a94;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.2);
  --radius:10px;--radius-sm:7px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;
    --text:#e8e8e4;--text2:#9a9a94;--text3:#6b6b66;
    --border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.2);
    --purple-light:#2a2660;--purple-dark:#c8c4f8;
    --green-light:#0d3326;--green-dark:#9fe1cb;
    --red-light:#3a1515;--amber-light:#3a2d10;
  }
}
body{background:var(--bg3);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif;font-size:16px;color:var(--text);min-height:100vh;}
.wrap{max-width:480px;margin:0 auto;padding:1rem 1rem 5rem;background:var(--bg3);min-height:100vh;}

/* ── 설정 배너 ── */
.setup-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:var(--radius);padding:.875rem 1rem;margin-bottom:1.25rem;font-size:13px;color:#664d03;line-height:1.6;}
.setup-banner code{background:rgba(0,0,0,.07);padding:1px 5px;border-radius:4px;font-size:12px;}

/* ── 헤더 ── */
.hdr{padding:1.25rem 0 .5rem;}
.crown{font-size:30px;margin-bottom:.375rem;}
h1{font-size:21px;font-weight:600;color:var(--text);}
.sub{font-size:13px;color:var(--text2);margin-top:3px;margin-bottom:1.5rem;}

/* ── 탭 ── */
.tabs{display:flex;gap:.4rem;margin-bottom:1.5rem;}
.tab{flex:1;padding:.625rem .4rem;text-align:center;font-size:14px;border:1px solid var(--border2);border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);background:var(--bg);}
.tab.on{background:var(--purple);color:white;border-color:var(--purple);}

/* ── 섹션 ── */
.sec{margin-bottom:1.375rem;}
.sec-title{font-size:11px;font-weight:600;color:var(--text2);letter-spacing:.07em;text-transform:uppercase;margin-bottom:.625rem;}

/* ── 이름 입력 ── */
.ni{width:100%;font-size:16px;padding:.75rem .875rem;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;}
.ni:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(83,74,183,.12);}

/* ── 달력 날짜 ── */
.mtabs{display:flex;gap:.4rem;margin-bottom:.75rem;}
.mtab{padding:.4rem .9rem;font-size:13px;border:1px solid var(--border2);border-radius:20px;cursor:pointer;color:var(--text2);background:var(--bg);}
.mtab.on{background:var(--purple);color:white;border-color:var(--purple);}
.day-mode{display:flex;gap:.35rem;margin-bottom:.5rem;}
.dm-btn{flex:1;padding:.45rem .4rem;text-align:center;font-size:12px;border:1px solid var(--border2);border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);background:var(--bg);}
.dm-btn.on-avail{background:var(--purple-light);border-color:var(--purple);color:var(--purple);}
.dm-btn.on-nope{background:var(--red-light);border-color:var(--red);color:var(--red-dark);}
.wk-block{margin-bottom:.6rem;}
.wk-head{font-size:11px;color:var(--text3);margin-bottom:.3rem;padding-left:2px;}
.day-row{display:flex;gap:.3rem;}
.day-chip{flex:1;padding:.5rem .15rem;text-align:center;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;color:var(--text);background:var(--bg);position:relative;user-select:none;}
.day-chip b{display:block;font-weight:500;}
.day-chip span{display:block;font-size:10px;color:var(--text3);margin-top:1px;}
.day-chip.sat span{color:var(--blue);}
.day-chip.sun span{color:var(--red);}
.day-chip.avail.on{background:var(--purple-light);border-color:var(--purple);color:var(--purple-dark);}
.day-chip.avail.on span{color:var(--purple);}
.day-chip.nope.on{background:var(--red-light);border-color:var(--red);color:var(--red-dark);}
.day-chip.nope.on span{color:var(--red);}
.day-chip-x{display:none;position:absolute;top:2px;right:3px;font-size:9px;color:var(--red);font-weight:600;}
.day-chip.nope.on .day-chip-x{display:block;}

/* ── 카드 ── */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:.7rem .875rem;margin-bottom:.35rem;cursor:pointer;display:flex;align-items:center;gap:10px;}
.card.on{border-color:var(--purple);background:var(--purple-light);}
.chk{width:18px;height:18px;min-width:18px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.card.on .chk{background:var(--purple);border-color:var(--purple);}
.dot{display:none;width:7px;height:7px;background:white;border-radius:50%;}
.card.on .dot{display:block;}
.card-lbl{font-size:14px;color:var(--text);}
.card.on .card-lbl{color:var(--purple-dark);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:.35rem;}

/* ── 여행 기간 ── */
.date-entry{background:var(--bg);border:1px solid var(--border2);border-radius:var(--radius);padding:.75rem .875rem;margin-bottom:.4rem;position:relative;}
.de-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.35rem;}
.de-row:last-child{margin-bottom:0;}
.de-lbl{font-size:12px;color:var(--text2);min-width:40px;}
.de-in{flex:1;font-size:15px;padding:.45rem .625rem;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg2);color:var(--text);outline:none;}
.de-in:focus{border-color:var(--purple);}
.del-btn{position:absolute;top:.5rem;right:.625rem;width:24px;height:24px;border-radius:50%;border:1px solid var(--border2);background:transparent;cursor:pointer;font-size:16px;color:var(--text2);line-height:22px;text-align:center;}
.add-btn{width:100%;padding:.65rem;border:1px dashed var(--border2);border-radius:var(--radius);background:transparent;font-size:14px;color:var(--text2);cursor:pointer;}

/* ── 지역 ── */
.loc-tabs{display:flex;gap:.4rem;margin-bottom:.625rem;}
.loc-tab{flex:1;padding:.55rem .4rem;text-align:center;font-size:14px;border:1px solid var(--border2);border-radius:var(--radius);cursor:pointer;color:var(--text2);background:var(--bg);}
.loc-tab.on-dom{background:var(--green);color:white;border-color:var(--green);}
.loc-tab.on-abr{background:var(--blue);color:white;border-color:var(--blue);}

/* ── 셀렉트 ── */
.sel{width:100%;font-size:15px;padding:.7rem .875rem;border:1px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);outline:none;-webkit-appearance:none;appearance:none;}

/* ── 토글 ── */
.drive-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:.875rem;}
.drive-row{display:flex;align-items:center;gap:10px;margin-bottom:.75rem;}
.drive-row:last-child{margin-bottom:0;}
.toggle-wrap{width:44px;height:26px;border-radius:13px;background:var(--border2);position:relative;cursor:pointer;flex-shrink:0;border:none;padding:0;}
.toggle-wrap.on{background:var(--purple);}
.toggle-knob{width:20px;height:20px;border-radius:50%;background:white;position:absolute;top:3px;left:3px;transition:left .15s;pointer-events:none;}
.toggle-wrap.on .toggle-knob{left:21px;}
.toggle-lbl{font-size:14px;color:var(--text);}

/* ── 에러/성공 ── */
.err{font-size:13px;color:#993C1D;margin-top:.5rem;min-height:18px;}
.ok-box{background:var(--green-light);border:1px solid #9FE1CB;border-radius:var(--radius);padding:.75rem .875rem;font-size:13px;color:var(--green-dark);margin-bottom:1rem;}

/* ── 버튼 ── */
.btn{width:100%;padding:.875rem;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;border:none;margin-top:.5rem;display:block;text-align:center;}
.btn-p{background:var(--purple);color:white;}
.btn-p:active{opacity:.85;}
.btn-s{background:transparent;color:var(--text2);border:1px solid var(--border2)!important;}

/* ── 결과 ── */
.ri{margin-bottom:.875rem;}
.ri-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.3rem;}
.ri-lbl{font-size:13px;color:var(--text);}
.ri-ct{font-size:12px;color:var(--text2);}
.bar-bg{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden;}
.bar{height:100%;border-radius:4px;}
.bar-purple{background:var(--purple-mid);}
.bar-red{background:var(--red);}
.tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:.3rem;}
.tag{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--purple-light);color:var(--purple);}
.tag-red{background:var(--red-light);color:var(--red-dark);}
.avs{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.5rem;}
.av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;}
.divider{height:1px;background:var(--border);margin:1.25rem 0;}
.badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:10px;background:var(--amber-light);color:var(--amber-dark);margin-left:6px;vertical-align:middle;}
.res-trip{background:var(--bg2);border-radius:var(--radius-sm);padding:.5rem .75rem;margin-bottom:.3rem;font-size:13px;display:flex;justify-content:space-between;align-items:center;}
.car-info{font-size:13px;background:var(--bg2);border-radius:var(--radius-sm);padding:.5rem .75rem;margin-top:.35rem;line-height:1.8;}
.sec-hint{font-size:12px;color:var(--text2);margin-bottom:.5rem;}
.legend{display:flex;gap:12px;margin-bottom:.625rem;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);}
.legend-dot{width:10px;height:10px;border-radius:3px;}
/* 로딩 */
.loading{padding:4rem 0;text-align:center;color:var(--text2);font-size:14px;}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">불러오는 중...</div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   ★ 설정: JSONBin.io 사용 방법
   1. https://jsonbin.io 에서 무료 가입
   2. 로그인 후 "Create Bin" 클릭 → 내용: {"votes":[]}
   3. 아래 BIN_ID와 API_KEY를 교체하세요
   ═══════════════════════════════════════════════════ */
const BIN_ID  = "69b530b0c3097a1dd52424d1";   // 예: 6649abc123def456789
const API_KEY = "$2a$10$RipkvLbRxByf8srJLaFX4.P/VwrNuR9g/ZCOq6CvvsbWpwJY4ZO1a";  // 예: $2a$10$...

const CONFIGURED = BIN_ID !== "YOUR_BIN_ID_HERE";

// ── 데이터 ──────────────────────────────────────────
const MONTHS={
  "4월":[
    {label:"4/3~6",  days:[{d:"2026-04-03",lbl:"3", dow:"금"},{d:"2026-04-04",lbl:"4", dow:"토"},{d:"2026-04-05",lbl:"5", dow:"일"},{d:"2026-04-06",lbl:"6", dow:"월"}]},
    {label:"4/10~13",days:[{d:"2026-04-10",lbl:"10",dow:"금"},{d:"2026-04-11",lbl:"11",dow:"토"},{d:"2026-04-12",lbl:"12",dow:"일"},{d:"2026-04-13",lbl:"13",dow:"월"}]},
    {label:"4/17~20",days:[{d:"2026-04-17",lbl:"17",dow:"금"},{d:"2026-04-18",lbl:"18",dow:"토"},{d:"2026-04-19",lbl:"19",dow:"일"},{d:"2026-04-20",lbl:"20",dow:"월"}]},
    {label:"4/24~27",days:[{d:"2026-04-24",lbl:"24",dow:"금"},{d:"2026-04-25",lbl:"25",dow:"토"},{d:"2026-04-26",lbl:"26",dow:"일"},{d:"2026-04-27",lbl:"27",dow:"월"}]},
  ],
  "5월":[
    {label:"5/1~4",  days:[{d:"2026-05-01",lbl:"1", dow:"금"},{d:"2026-05-02",lbl:"2", dow:"토"},{d:"2026-05-03",lbl:"3", dow:"일"},{d:"2026-05-04",lbl:"4", dow:"월"}]},
    {label:"5/8~11", days:[{d:"2026-05-08",lbl:"8", dow:"금"},{d:"2026-05-09",lbl:"9", dow:"토"},{d:"2026-05-10",lbl:"10",dow:"일"},{d:"2026-05-11",lbl:"11",dow:"월"}]},
    {label:"5/15~18",days:[{d:"2026-05-15",lbl:"15",dow:"금"},{d:"2026-05-16",lbl:"16",dow:"토"},{d:"2026-05-17",lbl:"17",dow:"일"},{d:"2026-05-18",lbl:"18",dow:"월"}]},
    {label:"5/22~25",days:[{d:"2026-05-22",lbl:"22",dow:"금"},{d:"2026-05-23",lbl:"23",dow:"토"},{d:"2026-05-24",lbl:"24",dow:"일"},{d:"2026-05-25",lbl:"25",dow:"월"}]},
    {label:"5/29~6/1",days:[{d:"2026-05-29",lbl:"29",dow:"금"},{d:"2026-05-30",lbl:"30",dow:"토"},{d:"2026-05-31",lbl:"31",dow:"일"},{d:"2026-06-01",lbl:"6/1",dow:"월"}]},
  ],
  "6월":[
    {label:"6/5~8",  days:[{d:"2026-06-05",lbl:"5", dow:"금"},{d:"2026-06-06",lbl:"6", dow:"토"},{d:"2026-06-07",lbl:"7", dow:"일"},{d:"2026-06-08",lbl:"8", dow:"월"}]},
    {label:"6/12~15",days:[{d:"2026-06-12",lbl:"12",dow:"금"},{d:"2026-06-13",lbl:"13",dow:"토"},{d:"2026-06-14",lbl:"14",dow:"일"},{d:"2026-06-15",lbl:"15",dow:"월"}]},
    {label:"6/19~22",days:[{d:"2026-06-19",lbl:"19",dow:"금"},{d:"2026-06-20",lbl:"20",dow:"토"},{d:"2026-06-21",lbl:"21",dow:"일"},{d:"2026-06-22",lbl:"22",dow:"월"}]},
    {label:"6/26~29",days:[{d:"2026-06-26",lbl:"26",dow:"금"},{d:"2026-06-27",lbl:"27",dow:"토"},{d:"2026-06-28",lbl:"28",dow:"일"},{d:"2026-06-29",lbl:"29",dow:"월"}]},
  ]
};
const VENUES=["파티룸","펜션","에어비앤비","상관없음"];
const DOM_LOCS=["서울/수도권","서울 근교","제주도","기타 국내"];
const ABR_LOCS=["일본","동남아시아","중국","기타 해외"];
const AMENS=[
  {id:"computer",label:"컴퓨터 (PoE 사양)"},
  {id:"shower",label:"샤워 시설"},
  {id:"bed",label:"침대 / 이불"},
  {id:"bbq",label:"야외 바베큐"},
  {id:"switch2",label:"닌텐도 스위치2"},
  {id:"playstation",label:"플레이스테이션"},
  {id:"karaoke",label:"노래방 기기"},
  {id:"projector",label:"빔프로젝터 / TV"},
  {id:"parking",label:"주차 가능"},
  {id:"pool",label:"수영장 / 온수풀"},
];
const SEATS_OPTS=["1명","2명","3명","4명","5명 이상"];
const AV_BG=["#EEEDFE","#E1F5EE","#FAECE7","#E6F1FB","#FAEEDA","#EAF3DE","#FBEAF0","#FCEBEB","#F1EFE8","#B5D4F4"];
const AV_FG=["#3C3489","#085041","#712B13","#0C447C","#633806","#27500A","#72243E","#791F1F","#444441","#0C447C"];

// ── 상태 ──────────────────────────────────────────
let st={
  votes:[],view:"form",activeMonth:"4월",dateMode:"avail",
  name:"",myVote:null,saving:false,
  form:{availDays:[],nopeDays:[],trips:[{from:"",to:""}],
    venue:"",locType:"",locations:[],amenities:[],
    canDrive:false,seats:"",wantAlcohol:false},
  err:"",msg:""
};

// ── JSONBin API ──────────────────────────────────
async function loadVotes(){
  if(!CONFIGURED){st.votes=[];return;}
  try{
    const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,
      {headers:{"X-Master-Key":API_KEY,"X-Bin-Meta":"false"}});
    const d=await r.json();
    st.votes=d.votes||[];
  }catch(e){st.votes=[];}
}
async function saveVotes(){
  if(!CONFIGURED)return;
  const r=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
    method:"PUT",
    headers:{"Content-Type":"application/json","X-Master-Key":API_KEY},
    body:JSON.stringify({votes:st.votes})
  });
  if(!r.ok)throw new Error("save failed");
}

// ── 유틸 ────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtDate(d){if(!d)return"";const[,m,dd]=d.split("-");return`${+m}/${+dd}`;}
function dowCls(d){if(d==="토")return" sat";if(d==="일")return" sun";return"";}

// ── 폼 HTML ─────────────────────────────────────
function formHTML(){
  const f=st.form;const has=st.myVote!==null;
  const mkeys=Object.keys(MONTHS);
  let banner="";
  if(!CONFIGURED){
    banner=`<div class="setup-banner">
      ⚙️ <strong>설정 필요:</strong> 이 파일을 공유하려면 <code>jsonbin.io</code>에 가입 후
      <code>BIN_ID</code>와 <code>API_KEY</code>를 파일 상단에 입력해야 합니다.
      지금은 데이터가 저장되지 않아요.
    </div>`;
  }
  let dayHTML=`<div class="mtabs">${mkeys.map(m=>`<div class="mtab${st.activeMonth===m?" on":""}" data-month="${esc(m)}">${m}</div>`).join("")}</div>`;
  dayHTML+=`<div class="day-mode">
    <div class="dm-btn${st.dateMode==="avail"?" on-avail":""}" data-dmode="avail">가능한 날짜</div>
    <div class="dm-btn${st.dateMode==="nope"?" on-nope":""}" data-dmode="nope">절대 안 되는 날</div>
  </div>`;
  if(st.dateMode==="nope")dayHTML+=`<div class="sec-hint">선택 시 빨간색으로 표시됩니다.</div>`;
  MONTHS[st.activeMonth].forEach(wk=>{
    dayHTML+=`<div class="wk-block"><div class="wk-head">${wk.label}</div><div class="day-row">`;
    wk.days.forEach(day=>{
      const isA=f.availDays.includes(day.d),isN=f.nopeDays.includes(day.d);
      const mode=isN?"nope":isA?"avail":"";
      dayHTML+=`<div class="day-chip${dowCls(day.dow)}${mode?" "+mode+" on":""}" data-day="${day.d}"><div class="day-chip-x">✕</div><b>${day.lbl}</b><span>${day.dow}</span></div>`;
    });
    dayHTML+=`</div></div>`;
  });
  let tripHTML="";
  f.trips.forEach((t,i)=>{
    tripHTML+=`<div class="date-entry"><button class="del-btn" data-del="${i}">×</button>
      <div class="de-row"><span class="de-lbl">가는날</span><input class="de-in" type="date" min="2026-04-01" max="2026-06-30" value="${esc(t.from)}" data-trip="${i}" data-field="from"></div>
      <div class="de-row"><span class="de-lbl">오는날</span><input class="de-in" type="date" min="2026-04-01" max="2026-06-30" value="${esc(t.to)}" data-trip="${i}" data-field="to"></div>
    </div>`;
  });
  const locOpts=f.locType==="국내"?DOM_LOCS:f.locType==="해외"?ABR_LOCS:[];
  return`<div>${banner}
    <div class="hdr"><div class="crown">👑</div><h1>킹데이 2026 투표</h1><p class="sub">4·5·6월 여행 일정 조율</p></div>
    <div class="tabs"><div class="tab on">투표하기</div><div class="tab" id="toRes">결과 보기 (${st.votes.length}명)</div></div>
    ${has?`<div class="ok-box">✓ 이미 투표하셨어요 — 아래서 수정 가능합니다.</div>`:""}
    <div class="sec"><div class="sec-title">이름</div>
      <input class="ni" id="nameIn" type="text" placeholder="이름 입력 (예: 홍길동)" value="${esc(st.name)}" autocomplete="off">
    </div>
    <div class="sec"><div class="sec-title">날짜 <span style="font-weight:400;opacity:.55">(탭 전환 후 선택)</span></div>${dayHTML}</div>
    <div class="sec"><div class="sec-title">여행 기간 <span style="font-weight:400;opacity:.55">(복수 추가 가능)</span></div>
      <div id="trips">${tripHTML}</div><button class="add-btn" id="addTrip">+ 일정 추가</button>
    </div>
    <div class="sec"><div class="sec-title">숙소 유형</div>
      ${VENUES.map(v=>`<div class="card${f.venue===v?" on":""}" data-single="venue" data-val="${esc(v)}"><div class="chk"><div class="dot"></div></div><div class="card-lbl">${v}</div></div>`).join("")}
    </div>
    <div class="sec"><div class="sec-title">여행 지역</div>
      <div class="loc-tabs">
        <div class="loc-tab${f.locType==="국내"?" on-dom":""}" data-loctype="국내">🇰🇷 국내</div>
        <div class="loc-tab${f.locType==="해외"?" on-abr":""}" data-loctype="해외">✈️ 해외</div>
      </div>
      ${locOpts.length?`<div class="g2">${locOpts.map(l=>`<div class="card${f.locations.includes(l)?" on":""}" data-multi="locations" data-val="${esc(l)}"><div class="chk"><div class="dot"></div></div><div class="card-lbl">${l}</div></div>`).join("")}</div>`:`<div style="font-size:13px;color:var(--text2);padding:.25rem 0">국내 또는 해외를 먼저 선택해주세요.</div>`}
    </div>
    <div class="sec"><div class="sec-title">필수 시설 <span style="font-weight:400;opacity:.55">(복수 선택)</span></div>
      <div class="g2">${AMENS.map(a=>`<div class="card${f.amenities.includes(a.id)?" on":""}" data-multi="amenities" data-val="${esc(a.id)}"><div class="chk"><div class="dot"></div></div><div class="card-lbl" style="font-size:13px">${a.label}</div></div>`).join("")}</div>
    </div>
    <div class="sec"><div class="sec-title">이동 / 기타</div>
      <div class="drive-box">
        <div class="drive-row">
          <button class="toggle-wrap${f.canDrive?" on":""}" data-toggle="canDrive"><div class="toggle-knob"></div></button>
          <span class="toggle-lbl">자차 운전 가능</span>
        </div>
        ${f.canDrive?`<div style="padding:.25rem 0 .75rem 54px">
          <div style="font-size:12px;color:var(--text2);margin-bottom:.35rem">탑승 가능 인원 (본인 제외)</div>
          <select class="sel" id="seatsSelect">${["","1명","2명","3명","4명","5명 이상"].map(s=>`<option value="${esc(s)}"${f.seats===s?" selected":""}>${s||"선택"}</option>`).join("")}</select>
        </div>`:""}
        <div class="drive-row">
          <button class="toggle-wrap${f.wantAlcohol?" on":""}" data-toggle="wantAlcohol"><div class="toggle-knob"></div></button>
          <span class="toggle-lbl">음주 희망</span>
        </div>
      </div>
    </div>
    <div class="err" id="errMsg">${st.err}</div>
    ${st.msg?`<div style="font-size:13px;color:var(--green-dark);margin-top:.5rem;">${esc(st.msg)}</div>`:""}
    <button class="btn btn-p" id="submitBtn">${st.saving?"저장 중...":(has?"투표 수정하기":"투표 제출하기")}</button>
    <button class="btn btn-s" id="toRes2">결과 먼저 보기</button>
  </div>`;
}

// ── 결과 HTML ────────────────────────────────────
function barItem(lbl,count,tot,voters,best,red){
  const pct=tot>0?Math.round(count/tot*100):0;
  return`<div class="ri">
    <div class="ri-top"><span class="ri-lbl">${lbl}${best?`<span class="badge">최다</span>`:""}</span><span class="ri-ct">${count}명 · ${pct}%</span></div>
    <div class="bar-bg"><div class="bar ${red?"bar-red":"bar-purple"}" style="width:${pct}%"></div></div>
    ${voters&&voters.length?`<div class="tags">${voters.map(n=>`<span class="${red?"tag-red":"tag"}">${esc(n)}</span>`).join("")}</div>`:""}
  </div>`;
}
function resultsHTML(){
  const tot=st.votes.length;
  const avc={},avn={},npc={},npn={};
  const vc={};VENUES.forEach(v=>vc[v]={count:0,v:[]});
  const lc={};[...DOM_LOCS,...ABR_LOCS].forEach(l=>lc[l]={count:0,v:[]});
  const ac={};AMENS.forEach(a=>ac[a.id]={count:0,v:[]});
  const ltc={"국내":{count:0,v:[]},"해외":{count:0,v:[]}};
  let drv=[],alc=[];const csT={};
  st.votes.forEach(v=>{
    (v.availDays||[]).forEach(d=>{avc[d]=(avc[d]||0)+1;avn[d]=avn[d]||[];avn[d].push(v.name);});
    (v.nopeDays||[]).forEach(d=>{npc[d]=(npc[d]||0)+1;npn[d]=npn[d]||[];npn[d].push(v.name);});
    if(vc[v.venue]){vc[v.venue].count++;vc[v.venue].v.push(v.name);}
    (v.locations||[]).forEach(l=>{if(lc[l]){lc[l].count++;lc[l].v.push(v.name);}});
    (v.amenities||[]).forEach(a=>{if(ac[a]){ac[a].count++;ac[a].v.push(v.name);}});
    if(v.locType&&ltc[v.locType]){ltc[v.locType].count++;ltc[v.locType].v.push(v.name);}
    if(v.canDrive){drv.push(v.name+(v.seats?` (${v.seats})`:"")); if(v.seats)csT[v.seats]=(csT[v.seats]||0)+1;}
    if(v.wantAlcohol)alc.push(v.name);
  });
  const allDays=[...new Set([...Object.keys(avc),...Object.keys(npc)])].sort();
  const bestDay=Object.keys(avc).length?Object.keys(avc).reduce((a,b)=>avc[a]>=avc[b]?a:b):null;
  const bestVenue=VENUES.reduce((a,b)=>vc[a].count>=vc[b].count?a:b,VENUES[0]);
  let tripRows="";
  st.votes.forEach(v=>{(v.trips||[]).filter(t=>t.from&&t.to).forEach(t=>{tripRows+=`<div class="res-trip"><span>${fmtDate(t.from)} → ${fmtDate(t.to)}</span><span style="font-size:11px;color:var(--text2)">${esc(v.name)}</span></div>`;});});
  const totalSeats=Object.entries(csT).reduce((s,[k,c])=>{const n=k==="5명 이상"?5:parseInt(k);return s+n*c;},0);
  return`<div>
    <div class="hdr"><div class="crown">👑</div><h1>킹데이 2026 결과</h1><p class="sub">총 ${tot}명 참여${tot===0?" — 아직 투표 없음":""}</p></div>
    <div class="tabs"><div class="tab" id="toForm">투표하기</div><div class="tab on">결과 보기 (${tot}명)</div></div>
    ${tot>0?`<div class="sec"><div class="sec-title">참여자 (${tot}명)</div>
      <div class="avs">${st.votes.map((v,i)=>`<div class="av" style="background:${AV_BG[i%10]};color:${AV_FG[i%10]}">${esc(v.name.slice(0,2))}</div>`).join("")}</div>
      <div style="font-size:13px;color:var(--text2);margin-top:.4rem">${st.votes.map(v=>esc(v.name)).join(", ")}</div>
    </div>`:""}
    ${tot>0&&allDays.length?`<div class="sec"><div class="sec-title">날짜별 현황</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#EEEDFE;border:1px solid #534AB7"></div>가능</div>
        <div class="legend-item"><div class="legend-dot" style="background:#FCEBEB;border:1px solid #E24B4A"></div>절대 불가</div>
      </div>
      ${allDays.map(d=>{const[,m,dd]=d.split("-");const ac2=avc[d]||0,nc=npc[d]||0;
        return`<div style="margin-bottom:.75rem"><div style="font-size:13px;font-weight:600;margin-bottom:.35rem">${+m}월 ${+dd}일</div>
          ${ac2>0?barItem(`가능 ${ac2}명`,ac2,tot,avn[d],d===bestDay,false):""}
          ${nc>0?barItem(`불가 ${nc}명`,nc,tot,npn[d],false,true):""}
        </div>`}).join("")}
    </div><div class="divider"></div>`:""}
    ${tot>0&&tripRows?`<div class="sec"><div class="sec-title">여행 기간 (가는날 → 오는날)</div>${tripRows}</div><div class="divider"></div>`:""}
    ${tot>0?`<div class="sec"><div class="sec-title">국내 vs 해외</div>
      ${["국내","해외"].map(l=>barItem(l,ltc[l].count,tot,ltc[l].v,false,false)).join("")}
    </div>
    <div class="sec"><div class="sec-title">선호 지역</div>
      ${[...DOM_LOCS,...ABR_LOCS].filter(l=>lc[l].count>0).sort((a,b)=>lc[b].count-lc[a].count).map(l=>barItem(l,lc[l].count,tot,lc[l].v,false,false)).join("")||`<div style="font-size:13px;color:var(--text2)">아직 응답 없음</div>`}
    </div><div class="divider"></div>`:""}
    ${tot>0?`<div class="sec"><div class="sec-title">숙소 유형</div>
      ${VENUES.map(v=>barItem(v,vc[v].count,tot,vc[v].v,v===bestVenue,false)).join("")}
    </div><div class="divider"></div>`:""}
    ${tot>0?`<div class="sec"><div class="sec-title">필수 시설 요구</div>
      ${AMENS.filter(a=>ac[a.id].count>0).sort((a,b)=>ac[b.id].count-ac[a.id].count).map(a=>barItem(a.label,ac[a.id].count,tot,ac[a.id].v,false,false)).join("")||`<div style="font-size:13px;color:var(--text2)">아직 응답 없음</div>`}
    </div><div class="divider"></div>`:""}
    ${tot>0?`<div class="sec"><div class="sec-title">이동 / 기타</div>
      <div style="margin-bottom:.75rem">
        <div style="font-size:13px;font-weight:600;margin-bottom:.35rem">🚗 자차 운전 가능 (${drv.length}명)</div>
        ${drv.length?`<div class="car-info">${drv.map(n=>esc(n)).join(" · ")}</div><div style="font-size:12px;color:var(--text2);margin-top:.35rem">탑승 가능 합산 약 ${totalSeats}명</div>`:`<div style="font-size:13px;color:var(--text2)">없음</div>`}
      </div>
      <div>
        <div style="font-size:13px;font-weight:600;margin-bottom:.35rem">🍺 음주 희망 (${alc.length}명)</div>
        ${alc.length?`<div class="tags">${alc.map(n=>`<span class="tag">${esc(n)}</span>`).join("")}</div>`:`<div style="font-size:13px;color:var(--text2)">없음</div>`}
      </div>
    </div>`:""}
    <button class="btn btn-p" id="toForm2">내 투표 ${st.myVote?"수정하기":"하러 가기"}</button>
  </div>`;
}

// ── 이벤트 바인딩 ────────────────────────────────
function bind(){
  const app=document.getElementById("app");
  app.querySelectorAll("[data-month]").forEach(el=>el.addEventListener("click",()=>{st.activeMonth=el.dataset.month;render();}));
  app.querySelectorAll("[data-dmode]").forEach(el=>el.addEventListener("click",()=>{st.dateMode=el.dataset.dmode;render();}));
  app.querySelectorAll("[data-day]").forEach(el=>el.addEventListener("click",()=>{
    const d=el.dataset.day,f=st.form;
    if(st.dateMode==="avail"){const i=f.availDays.indexOf(d);if(i>-1)f.availDays.splice(i,1);else{f.nopeDays=f.nopeDays.filter(x=>x!==d);f.availDays.push(d);}}
    else{const i=f.nopeDays.indexOf(d);if(i>-1)f.nopeDays.splice(i,1);else{f.availDays=f.availDays.filter(x=>x!==d);f.nopeDays.push(d);}}
    st.err="";render();
  }));
  app.querySelectorAll("[data-single]").forEach(el=>el.addEventListener("click",()=>{st.form[el.dataset.single]=el.dataset.val;st.err="";render();}));
  app.querySelectorAll("[data-multi]").forEach(el=>el.addEventListener("click",()=>{
    const arr=st.form[el.dataset.multi],v=el.dataset.val,i=arr.indexOf(v);
    if(i>-1)arr.splice(i,1);else arr.push(v);render();
  }));
  app.querySelectorAll("[data-loctype]").forEach(el=>el.addEventListener("click",()=>{st.form.locType=el.dataset.loctype;st.form.locations=[];st.err="";render();}));
  app.querySelectorAll("[data-toggle]").forEach(el=>el.addEventListener("click",()=>{
    const k=el.dataset.toggle;st.form[k]=!st.form[k];
    if(k==="canDrive"&&!st.form.canDrive)st.form.seats="";render();
  }));
  const ni=document.getElementById("nameIn");
  if(ni)ni.addEventListener("input",e=>{st.name=e.target.value;st.err="";});
  const ss=document.getElementById("seatsSelect");
  if(ss)ss.addEventListener("change",e=>{st.form.seats=e.target.value;});
  app.querySelectorAll("[data-trip]").forEach(inp=>inp.addEventListener("change",e=>{st.form.trips[+e.target.dataset.trip][e.target.dataset.field]=e.target.value;}));
  app.querySelectorAll("[data-del]").forEach(btn=>btn.addEventListener("click",()=>{const i=+btn.dataset.del;if(st.form.trips.length>1)st.form.trips.splice(i,1);render();}));
  const addTrip=document.getElementById("addTrip");
  if(addTrip)addTrip.addEventListener("click",()=>{st.form.trips.push({from:"",to:""});render();});
  const sub=document.getElementById("submitBtn");
  if(sub)sub.addEventListener("click",doSubmit);
  ["toRes","toRes2"].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener("click",()=>{st.view="results";render();});});
  ["toForm","toForm2"].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener("click",()=>{st.view="form";render();});});
}

async function doSubmit(){
  const nm=(document.getElementById("nameIn")?.value||"").trim()||st.name.trim();
  if(!nm){st.err="이름을 입력해주세요.";render();return;}
  const f=st.form;
  if(!f.availDays.length&&!f.trips.some(t=>t.from&&t.to)){st.err="가능한 날짜 또는 여행 기간을 선택해주세요.";render();return;}
  if(!f.venue){st.err="숙소 유형을 선택해주세요.";render();return;}
  if(!f.locType){st.err="국내/해외를 선택해주세요.";render();return;}
  st.name=nm;
  const vo={name:nm,availDays:[...f.availDays],nopeDays:[...f.nopeDays],
    trips:f.trips.map(t=>({...t})),venue:f.venue,locType:f.locType,
    locations:[...f.locations],amenities:[...f.amenities],
    canDrive:f.canDrive,seats:f.seats,wantAlcohol:f.wantAlcohol,ts:Date.now()};
  const idx=st.votes.findIndex(v=>v.name===nm);
  if(idx>-1)st.votes[idx]=vo;else st.votes.push(vo);
  st.myVote=vo;st.err="";st.saving=true;render();
  try{
    await saveVotes();
    st.saving=false;st.msg="✓ 투표가 저장되었습니다!";
    st.view="results";render();
    setTimeout(()=>{st.msg="";render();},3000);
  }catch(e){
    st.saving=false;st.err="저장 실패. 다시 시도해주세요.";render();
  }
}

function render(){document.getElementById("app").innerHTML=st.view==="form"?formHTML():resultsHTML();bind();}

(async function(){await loadVotes();render();})();
</script>
</body>
</html>
