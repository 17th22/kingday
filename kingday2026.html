.wk-head{font-size:12px;color:var(--text3);margin-bottom:.3rem;padding-left:2px;font-weight:600;}
.day-row{display:flex;gap:.3rem;}

.tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:.4rem;}

.divider{height:1px;background:var(--border);margin:1.25rem 0;}

.star-row{display:flex;justify-content:center;gap:4px;margin-top:4px;}
</style>

function barItem(lbl,count,tot,voters,best,red){
  const pct=tot>0?Math.round(count/tot*100):0;
  return`<div class="ri">
    <div class="ri-top"><span class="ri-lbl">${lbl}${best?`<span class="best-badge">최다 🏆</span>`:""}</span><span class="ri-ct">${count}명 · ${pct}%</span></div>
    <div class="bar-bg"><div class="bar ${red?"bar-r":"bar-p"}" style="width:${pct}%"></div></div>
    ${voters&&voters.length?`<div class="tags">${voters.map(n=>`<span class="${red?"tag-r":"tag"}">${esc(n)}</span>`).join("")}</div>`:""}
  </div>`;
}

function resultsHTML(){
  const tot=st.votes.length;
  const avc={},avn={},npc={},npn={};
  const vc={};VENUES.forEach(v=>vc[v]={count:0,v:[]});
  const lc={};[...DOM_LOCS,...ABR_LOCS].forEach(l=>lc[l]={count:0,v:[]});
  const ac={};AMENS.forEach(a=>ac[a.id]={count:0,v:[]});
  const bc={};BUDGETS.forEach(b=>bc[b]={count:0,v:[]});
  const ltc={"국내":{count:0,v:[]},"해외":{count:0,v:[]}};
  let drv=[],alc=[];const csT={};
  st.votes.forEach(v=>{
    (v.availDays||[]).forEach(d=>{avc[d]=(avc[d]||0)+1;avn[d]=avn[d]||[];avn[d].push(v.name);});
    (v.nopeDays||[]).forEach(d=>{npc[d]=(npc[d]||0)+1;npn[d]=npn[d]||[];npn[d].push(v.name);});
    (v.venues||[]).forEach(vn=>{if(vc[vn]){vc[vn].count++;vc[vn].v.push(v.name);}});
    (v.locations||[]).forEach(l=>{if(lc[l]){lc[l].count++;lc[l].v.push(v.name);}});
    (v.amenities||[]).forEach(a=>{if(ac[a]){ac[a].count++;ac[a].v.push(v.name);}});
    (v.budgets||[]).forEach(b=>{if(bc[b]){bc[b].count++;bc[b].v.push(v.name);}});
    if(v.locType&&ltc[v.locType]){ltc[v.locType].count++;ltc[v.locType].v.push(v.name);}
    if(v.canDrive){drv.push(v.name+(v.seats?` (${v.seats})`:""));if(v.seats)csT[v.seats]=(csT[v.seats]||0)+1;}
    if(v.wantAlcohol)alc.push(v.name);
  });
  const allDays=[...new Set([...Object.keys(avc),...Object.keys(npc)])].sort();
  const bestDay=Object.keys(avc).length?Object.keys(avc).reduce((a,b)=>avc[a]>=avc[b]?a:b):null;
  const bestVenue=VENUES.filter(v=>vc[v].count>0).sort((a,b)=>vc[b].count-vc[a].count)[0];
  let tripRows="";
  st.votes.forEach(v=>{(v.trips||[]).filter(t=>t.from&&t.to).forEach(t=>{tripRows+=`<div class="res-trip"><span>${fmtDate(t.from)} → ${fmtDate(t.to)}</span><span style="font-size:11px;color:var(--text2)">${esc(v.name)}</span></div>`;});});
  const totalSeats=Object.entries(csT).reduce((s,[k,c])=>{const n=k==="5명 이상"?5:parseInt(k);return s+n*c;},0);
  return`<div>
    <div class="hdr"><span class="hdr-emoji">📊</span><h1>킹데이 2026 결과</h1><p class="sub">총 ${tot}명 참여${tot===0?" — 아직 투표 없음":""}</p></div>
    <div class="tabs"><div class="tab" id="toForm">✏️ 투표하기</div><div class="tab on">📊 결과 (${tot}명)</div><div class="tab" id="toAdmin">🔐 관리자</div></div>
    ${st.myVote?`<div style="display:flex;gap:.5rem;margin-bottom:1rem;">
      <button class="btn btn-s" style="flex:1;margin-top:0" id="toForm3">✏️ 수정하기</button>
      <button class="btn btn-danger" style="flex:1;margin-top:0" id="cancelVoteBtn2">🗑️ 투표 취소</button>
    </div>`:""}
    ${tot>0?`<div class="sec"><div class="sec-title">참여자 (${tot}명)</div>
      <div class="avs">${st.votes.map((v,i)=>`<div class="av" style="background:${AV_BG[i%10]};color:${AV_FG[i%10]}" title="${esc(v.name)}">${esc(v.name.slice(0,2))}</div>`).join("")}</div>
      <div style="font-size:13px;color:var(--text2);margin-top:.4rem">${st.votes.map(v=>esc(v.name)).join(", ")}</div>
    </div>`:""}
    ${tot>0&&allDays.length?`<div class="sec"><div class="sec-title">날짜별 현황</div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--pl);border:1px solid var(--p)"></div>가능</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--rl);border:1px solid var(--r)"></div>절대 불가</div>
      </div>
      ${allDays.map(d=>{const[,m,dd]=d.split("-");const ac2=avc[d]||0,nc=npc[d]||0;
        return`<div style="margin-bottom:.75rem"><div style="font-size:13px;font-weight:700;margin-bottom:.35rem">${+m}월 ${+dd}일</div>
          ${ac2>0?barItem(`가능 ${ac2}명`,ac2,tot,avn[d],d===bestDay,false):""}
          ${nc>0?barItem(`불가 ${nc}명`,nc,tot,npn[d],false,true):""}
        </div>`}).join("")}
    </div><div class="divider"></div>`:""}
    ${tot>0&&tripRows?`<div class="sec"><div class="sec-title">여행 기간</div>${tripRows}</div><div class="divider"></div>`:""}
    ${tot>0?`<div class="sec"><div class="sec-title">국내 vs 해외</div>
      ${["국내","해외"].map(l=>barItem(l,ltc[l].count,tot,ltc[l].v,false,false)).join("")}
    </div>
    <div class="sec"><div class="sec-title">선호 지역</div>
      ${[...DOM_LOCS,...ABR_LOCS].filter(l=>lc[l].count>0).sort((a,b)=>lc[b].count-lc[a].count).map(l=>barItem(l,lc[l].count,tot,lc[l].v,false,false)).join("")||`<div style="font-size:13px;color:var(--text2)">아직 응답 없음</div>`}
    </div><div class="divider"></div>`:""}
    ${tot>0?`<div class="sec"><div class="sec-title">숙소 유형</div>
      ${VENUES.map(v=>barItem(v,vc[v].count,tot,vc[v].v,v===bestVenue,false)).join("")}
    </div><div class="divider"></div>`:""}
    ${tot>0?`<div class="sec"><div class="sec-title">1인 총 경비</div>
      ${BUDGETS.map(b=>barItem(b,bc[b].count,tot,bc[b].v,false,false)).join("")}
    </div><div class="divider"></div>`:""}
    ${tot>0?`<div class="sec"><div class="sec-title">필수 시설 요구</div>
      ${AMENS.filter(a=>ac[a.id].count>0).sort((a,b)=>ac[b.id].count-ac[a.id].count).map(a=>barItem(a.label,ac[a.id].count,tot,ac[a.id].v,false,false)).join("")||`<div style="font-size:13px;color:var(--text2)">아직 응답 없음</div>`}
    </div><div class="divider"></div>`:""}
    ${tot>0?`<div class="sec"><div class="sec-title">이동 / 기타</div>
      <div style="margin-bottom:.875rem">
        <div style="font-size:13px;font-weight:700;margin-bottom:.35rem">🚗 자차 운전 가능 (${drv.length}명)</div>
        ${drv.length?`<div class="car-info">${drv.map(n=>esc(n)).join(" · ")}</div><div style="font-size:12px;color:var(--text2);margin-top:.35rem">탑승 가능 합산 약 ${totalSeats}명</div>`:`<div style="font-size:13px;color:var(--text2)">없음</div>`}
      </div>
      <div>
        <div style="font-size:13px;font-weight:700;margin-bottom:.35rem">🍺 음주 희망 (${alc.length}명)</div>
        ${alc.length?`<div class="tags">${alc.map(n=>`<span class="tag">${esc(n)}</span>`).join("")}</div>`:`<div style="font-size:13px;color:var(--text2)">없음</div>`}
      </div>
    </div>`:""}
    ${tot>0&&st.votes.some(v=>v.memo)?`<div class="sec"><div class="sec-title">💬 희망사항 / 메모</div>
      ${st.votes.filter(v=>v.memo).map(v=>`<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem;margin-bottom:.4rem;box-shadow:var(--shadow);">
        <div style="font-size:12px;font-weight:700;color:var(--p);margin-bottom:.3rem">${esc(v.name)}</div>
        <div style="font-size:13px;color:var(--text);line-height:1.6;white-space:pre-wrap">${esc(v.memo)}</div>
      </div>`).join("")}
    </div>`:""}
  </div>`;
}

async function cancelVote(){
  const nm=st.myVote?.name||st.name.trim();
  if(!nm)return;
  if(!confirm(`"${nm}"의 투표를 취소할까요?`))return;
  st.votes=st.votes.filter(v=>v.name!==nm);
  st.myVote=null;
  st.form={availDays:[],nopeDays:[],trips:[{from:"",to:""}],
    venues:[],locType:"",locations:[],amenities:[],budgets:[],
    canDrive:false,seats:"",wantAlcohol:false,memo:""};
  st.err="";st.msg="투표가 취소되었습니다.";
  try{await saveVotes();}catch(e){}
  st.view="form";render();
  setTimeout(()=>{st.msg="";render();},3000);
}

function bind(){
  const app=document.getElementById("app");
  app.querySelectorAll("[data-month]").forEach(el=>el.addEventListener("click",()=>{st.activeMonth=el.dataset.month;render();}));
  app.querySelectorAll("[data-dmode]").forEach(el=>el.addEventListener("click",()=>{st.dateMode=el.dataset.dmode;render();}));
  app.querySelectorAll("[data-day]").forEach(el=>el.addEventListener("click",()=>{
    const d=el.dataset.day,f=st.form;
    if(st.dateMode==="avail"){const i=f.availDays.indexOf(d);if(i>-1)f.availDays.splice(i,1);else{f.nopeDays=f.nopeDays.filter(x=>x!==d);f.availDays.push(d);}}
    else{const i=f.nopeDays.indexOf(d);if(i>-1)f.nopeDays.splice(i,1);else{f.availDays=f.availDays.filter(x=>x!==d);f.nopeDays.push(d);}}
    st.err="";render();
  }));
  app.querySelectorAll("[data-marr]").forEach(el=>el.addEventListener("click",()=>{
    const key=el.dataset.marr,val=el.dataset.val;
    const arr=st.form[key];const i=arr.indexOf(val);
    if(i>-1)arr.splice(i,1);else arr.push(val);render();
  }));
  app.querySelectorAll("[data-loctype]").forEach(el=>el.addEventListener("click",()=>{
    const prev=st.form.locType;
    st.form.locType=el.dataset.loctype===prev?"":el.dataset.loctype;
    st.form.locations=[];st.err="";render();
  }));
  app.querySelectorAll("[data-toggle]").forEach(el=>el.addEventListener("click",()=>{
    const k=el.dataset.toggle;st.form[k]=!st.form[k];
    if(k==="canDrive"&&!st.form.canDrive)st.form.seats="";render();
  }));
  const ni=document.getElementById("nameIn");
  if(ni)ni.addEventListener("input",e=>{st.name=e.target.value;st.err="";});
  const mi=document.getElementById("memoIn");
  if(mi)mi.addEventListener("input",e=>{st.form.memo=e.target.value;});
  const ss=document.getElementById("seatsSelect");
  if(ss)ss.addEventListener("change",e=>{st.form.seats=e.target.value;});
  app.querySelectorAll("[data-trip]").forEach(inp=>inp.addEventListener("change",e=>{st.form.trips[+e.target.dataset.trip][e.target.dataset.field]=e.target.value;}));
  app.querySelectorAll("[data-del]").forEach(btn=>btn.addEventListener("click",()=>{const i=+btn.dataset.del;if(st.form.trips.length>1)st.form.trips.splice(i,1);render();}));
  const addTrip=document.getElementById("addTrip");
  if(addTrip)addTrip.addEventListener("click",()=>{st.form.trips.push({from:"",to:""});render();});
  const sub=document.getElementById("submitBtn");
  if(sub)sub.addEventListener("click",doSubmit);
  const cvb=document.getElementById("cancelVoteBtn");
  if(cvb)cvb.addEventListener("click",cancelVote);
  const cvb2=document.getElementById("cancelVoteBtn2");
  if(cvb2)cvb2.addEventListener("click",cancelVote);
  ["toRes","toRes2"].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener("click",()=>{st.view="results";render();});});
  ["toForm","toForm2","toForm3"].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener("click",()=>{st.view="form";render();});});
  const toAdmin=document.getElementById("toAdmin");
  if(toAdmin)toAdmin.addEventListener("click",()=>{st.view="admin";render();});
}

async function doSubmit(){
  const nm=(document.getElementById("nameIn")?.value||"").trim()||st.name.trim();
  if(!nm){st.err="이름을 입력해주세요.";render();return;}
  const f=st.form;
  if(!f.availDays.length&&!f.trips.some(t=>t.from&&t.to)){st.err="가능한 날짜 또는 여행 기간을 선택해주세요.";render();return;}
  if(!f.venues.length){st.err="숙소 유형을 선택해주세요.";render();return;}
  if(!f.locType){st.err="국내/해외를 선택해주세요.";render();return;}
  st.name=nm;
  const vo={name:nm,availDays:[...f.availDays],nopeDays:[...f.nopeDays],
    trips:f.trips.map(t=>({...t})),venues:[...f.venues],locType:f.locType,
    locations:[...f.locations],amenities:[...f.amenities],budgets:[...f.budgets],
    canDrive:f.canDrive,seats:f.seats,wantAlcohol:f.wantAlcohol,memo:f.memo||"",ts:Date.now()};
  const idx=st.votes.findIndex(v=>v.name===nm);
  if(idx>-1)st.votes[idx]=vo;else st.votes.push(vo);
  st.myVote=vo;st.err="";st.saving=true;render();
  try{
    await saveVotes();
    st.saving=false;st.msg="🎉 투표가 저장되었습니다!";
    st.view="results";render();
    setTimeout(()=>{st.msg="";render();},3000);
  }catch(e){st.saving=false;st.err="저장 실패. 다시 시도해주세요.";render();}
}

const ADMIN_PW = "1717";

function adminHTML(){
  return`<div>
    <div class="hdr"><span class="hdr-emoji">🔐</span><h1>관리자 모드</h1><p class="sub">투표 삭제 및 전체 관리</p></div>
    <div class="tabs"><div class="tab" id="toForm">✏️ 투표하기</div><div class="tab" id="toRes">📊 결과 보기</div><div class="tab on">🔐 관리자</div></div>
    ${st.votes.length===0?`<div style="text-align:center;padding:2rem;color:var(--text2);font-size:14px">저장된 투표가 없어요.</div>`:""}
    ${st.votes.map((v,i)=>`<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:.875rem 1rem;margin-bottom:.5rem;display:flex;align-items:center;justify-content:space-between;box-shadow:var(--shadow);">
      <div>
        <div style="font-size:15px;font-weight:700;color:var(--text)">${esc(v.name)}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">${v.venues?v.venues.join(", "):""} · ${v.locType||""} · ${(v.locations||[]).join(", ")||"지역 미선택"}</div>
        <div style="font-size:11px;color:var(--text3);margin-top:2px">${new Date(v.ts).toLocaleString("ko-KR")}</div>
      </div>
      <button data-deluser="${esc(v.name)}" style="background:var(--rl);border:1.5px solid var(--r);color:var(--r);border-radius:var(--radius-sm);padding:.4rem .8rem;font-size:13px;font-weight:700;cursor:pointer;">삭제</button>
    </div>`).join("")}
    ${st.votes.length>0?`<button class="btn btn-danger" id="clearAllBtn" style="margin-top:1rem">🗑️ 전체 삭제</button>`:""}
    <button class="btn btn-s" id="adminLogout" style="margin-top:.5rem">로그아웃</button>
  </div>`;
}

function adminLoginHTML(){
  return`<div>
    <div class="hdr"><span class="hdr-emoji">🔐</span><h1>관리자 로그인</h1><p class="sub">비밀번호를 입력하세요</p></div>
    <div class="tabs"><div class="tab" id="toForm">✏️ 투표하기</div><div class="tab" id="toRes">📊 결과 보기</div><div class="tab on">🔐 관리자</div></div>
    <div class="sec"><div class="sec-title">비밀번호</div>
      <input class="ni" id="adminPwIn" type="password" placeholder="비밀번호 입력">
      <div style="font-size:13px;color:var(--text2);margin-top:.5rem;">💡 비밀번호는 <strong style="color:var(--p)">1717</strong> 이에요</div>
    </div>
    <div class="err" id="adminErr"></div>
    <button class="btn btn-p" id="adminLoginBtn">🔓 로그인</button>
    <button class="btn btn-s" id="toForm2" style="margin-top:.5rem">돌아가기</button>
  </div>`;
}

function bindAdmin(){
  const app=document.getElementById("app");
  ["toRes"].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener("click",()=>{st.view="results";render();});});
  ["toForm","toForm2"].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener("click",()=>{st.view="form";render();});});
  const loginBtn=document.getElementById("adminLoginBtn");
  const doLogin=()=>{
    const pw=document.getElementById("adminPwIn")?.value||"";
    if(pw===ADMIN_PW){st.isAdmin=true;render();}
    else{document.getElementById("adminErr").textContent="비밀번호가 틀렸어요.";}
  };
  if(loginBtn)loginBtn.addEventListener("click",doLogin);
  const pwIn=document.getElementById("adminPwIn");
  if(pwIn)pwIn.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
  const logoutBtn=document.getElementById("adminLogout");
  if(logoutBtn)logoutBtn.addEventListener("click",()=>{st.isAdmin=false;st.view="form";render();});
  const clearAll=document.getElementById("clearAllBtn");
  if(clearAll)clearAll.addEventListener("click",async()=>{
    if(!confirm("전체 투표를 삭제할까요?"))return;
    st.votes=[];await saveVotes();render();
  });
  app.querySelectorAll("[data-deluser]").forEach(btn=>btn.addEventListener("click",async()=>{
    const nm=btn.dataset.deluser;
    if(!confirm(`"${nm}"의 투표를 삭제할까요?`))return;
    st.votes=st.votes.filter(v=>v.name!==nm);
    if(st.myVote?.name===nm)st.myVote=null;
    await saveVotes();render();
  }));
}

function render(){
  const app=document.getElementById("app");
  if(st.view==="admin"){
    app.innerHTML=st.isAdmin?adminHTML():adminLoginHTML();
    bindAdmin();
  } else {
    app.innerHTML=st.view==="form"?formHTML():resultsHTML();
    bind();
  }
}

(async function(){await loadVotes();render();})();
</script>
</body>
